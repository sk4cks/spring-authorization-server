server:
  port: 9000
  servlet:
    context-path: "/authorization-api"

spring:
  profiles:
    default: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notedb}
    username: ${SPRING_DATASOURCE_USERNAME:note}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true
    schemas: note
    default-schema: note
    create-schemas: true
    # DBeaver 등으로 스키마를 먼저 만든 DB: V1 실행 없이 "이미 1까지 적용됨" 표시
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "SYS_USER created manually before Flyway"
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        # PostgreSQL 기본 전략이 SYS_USER → sys_user 로 바꿔 Flyway DDL("SYS_USER")과 어긋남
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    properties:
      hibernate:
        default_schema: note
        globally_quoted_identifiers: true
  security:
    oauth2:
      authorizationserver:
        # SAS 1.2: issuer에 path 불가 → context-path와 분리. API issuer-uri와 동일해야 함.
        issuer: http://localhost:9000
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/gmail.readonly
              - https://www.googleapis.com/auth/gmail.send
              - https://www.googleapis.com/auth/gmail.modify
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
            client-name: Naver
        provider:
          google:
            issuer-uri: https://accounts.google.com
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

app:
  internal-api-key: ${AUTH_INTERNAL_API_KEY:dev-internal-key}
  mail:
    domain: ${MAIL_DOMAIN:note.local}
