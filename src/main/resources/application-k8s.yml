# k8s (note namespace) — Auth Server Pod
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/notedb
    username: note
    password: ${SPRING_DATASOURCE_PASSWORD:}
  security:
    oauth2:
      authorizationserver:
        issuer: https://auth.13.239.220.205.nip.io

app:
  mail:
    domain: ${MAIL_DOMAIN:note.local}
    # mailbox-secret / salt / mailcow api-key → k8s Secret env 만 (기본값 없음)
    mailbox-secret: ${MAILBOX_PASSWORD_SECRET:}
    mailbox-salt: ${MAILBOX_PASSWORD_SALT:}
    mailcow:
      enabled: ${MAILCOW_ENABLED:false}
      base-url: ${MAILCOW_BASE_URL:}
      api-key: ${MAILCOW_API_KEY:}
      imap-host: ${MAILCOW_IMAP_HOST:}
      imap-port: ${MAILCOW_IMAP_PORT:993}
      smtp-host: ${MAILCOW_SMTP_HOST:}
      smtp-port: ${MAILCOW_SMTP_PORT:587}
