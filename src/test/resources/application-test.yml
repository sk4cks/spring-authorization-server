spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:notedb;MODE=PostgreSQL;DATABASE_TO_LOWER=FALSE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        default_schema: note
        globally_quoted_identifiers: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret

app:
  mail:
    domain: note.local
